before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "cmdock_{{ .Os }}_{{ .Arch }}"

release:
  github:
    owner: gurliv21
    name: cmdock